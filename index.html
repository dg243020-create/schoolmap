<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大商学園 高機能校内ナビマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* 左側のコントロールパネル */
        #panel { width: 300px; background: #ffffff; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding: 20px; z-index: 10; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        h3 { margin-top: 0; color: #005bac; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        select, button { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background: #005bac; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #004080; }
        
        /* 右側のマップエリア（画面いっぱい） */
        #map { flex-grow: 1; height: 100%; background: #e0e0e0; }
        
        /* 現在の階層を表示するバッジ（画面右上に固定） */
        #floor-badge { position: absolute; top: 10px; right: 10px; background: rgba(0, 85, 172, 0.9); color: white; padding: 10px 20px; font-weight: bold; font-size: 18px; border-radius: 8px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <div id="panel">
        <h3>大商学園 ナビ</h3>
        
        <div class="input-group">
            <label for="start">現在地（出発点）</label>
            <select id="start">
                <option value="gate">正門 (1F)</option>
                <option value="lobby">本館 1階ロビー (1F)</option>
                <option value="classA">本館 2階 教室A (2F)</option>
                <option value="pc_room">本館 3階 パソコン室 (3F)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="end">目的地</label>
            <select id="end">
                <option value="gate">正門 (1F)</option>
                <option value="lobby">本館 1階ロビー (1F)</option>
                <option value="classA" selected>本館 2階 教室A (2F)</option>
                <option value="pc_room">本館 3階 パソコン室 (3F)</option>
            </select>
        </div>
        
        <button onclick="searchRoute()">ルートを検索</button>
        <hr style="width:100%; border:0; border-top:1px solid #eee; margin: 10px 0;">
        
        <div class="input-group">
            <label for="floorSelect">階層（手動切り替え）</label>
            <select id="floorSelect" onchange="changeFloor(parseInt(this.value))">
                <option value="1">1階 (1F)</option>
                <option value="2">2階 (2F)</option>
                <option value="3">3階 (3F)</option>
            </select>
        </div>
        
        <p style="font-size: 11px; color: #888; margin-top: auto;">
            💡 <b>ヒント</b><br>
            ・マップのどこかをクリックすると階層が 1F ➔ 2F ➔ 3F ➔ 1F と切り替わります。<br>
            ・クリックした場所の座標（Y, X）がアラートで出るのでピンの位置調整に使えます。
        </p>
    </div>

    <div id="floor-badge"><span id="badge-text">1F</span></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 画像の設定（HTMLと同じフォルダにある前提）
        // 2階、3階の画像（A2F.png, A3F.png）がまだない場合は、エラー回避のため一旦すべて 'A1F.png' にしておいても動きます
        const floorImages = {
            1: 'A1F.png',
            2: 'A1F.png', // 準備ができたら 'A2F.png' に書き換えてください
            3: 'A1F.png'  // 準備ができたら 'A3F.png' に書き換えてください
        };

        // 画像のサイズ（ピクセル）。お使いの A1F.png の大きさに合わせて数値を調整してください
        const imageWidth = 1200;
        const imageHeight = 800;
        const bounds = [[0, 0], [imageHeight, imageWidth]];

        // 現在表示している階層（初期値は1階）
        let currentFloor = 1;
        let mapImageOverlay = null;
        let currentRoute = null;

        // Leafletを画像専用モード(L.CRS.Simple)で初期化
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 2
        });

        // カメラの初期位置を画像全体にフィットさせる
        map.fitBounds(bounds);

        // 各教室やスポットの「画像上の座標」データ [Y座標, X座標]
        // ※左下が [0,0]、右上が [800, 1200] になります
        const spots = {
            gate: { coords: [150, 200], name: "正門", floor: 1 },
            lobby: { coords: [400, 600], name: "本館 1階ロビー", floor: 1 },
            classA: { coords: [450, 650], name: "本館 2階 教室A", floor: 2 },
            pc_room: { coords: [500, 700], name: "本館 3階 パソコン室", floor: 3 }
        };

        // 階層ごとにマーカー（ピン）を管理するためのグループ
        const floorMarkerGroups = {
            1: L.layerGroup(),
            2: L.layerGroup(),
            3: L.layerGroup()
        };

        // 各スポットのピンをそれぞれの階層グループに登録する
        L.marker(spots.gate.coords).bindPopup("<b>正門 (1F)</b>").addTo(floorMarkerGroups[1]);
        L.marker(spots.lobby.coords).bindPopup("<b>本館 1階ロビー</b>").addTo(floorMarkerGroups[1]);
        L.marker(spots.classA.coords).bindPopup("<b>本館 2階 教室A</b>").addTo(floorMarkerGroups[2]);
        L.marker(spots.pc_room.coords).bindPopup("<b>本館 3階 パソコン室</b>").addTo(floorMarkerGroups[3]);

        // 階層を切り替えるメイン関数
        function changeFloor(floorNum) {
            // 1. 古い背景画像を削除
            if (mapImageOverlay) {
                map.removeLayer(mapImageOverlay);
            }
            // 2. 新しい階層の画像を背景に設定
            mapImageOverlay = L.imageOverlay(floorImages[floorNum], bounds).addTo(map);

            // 3. すべてのピンを一度マップから消し、選択された階のピンだけを表示
            for (let f in floorMarkerGroups) {
                map.removeLayer(floorMarkerGroups[f]);
            }
            floorMarkerGroups[floorNum].addTo(map);

            // 4. 現在の階層状態を更新し、画面上の表示（選択ボックスやバッジ）を変える
            currentFloor = floorNum;
            document.getElementById('floorSelect').value = floorNum;
            document.getElementById('badge-text').innerText = floorNum + "F";
        }

        // マップをクリックした時に「階層をループ切り替え」する機能
        map.on('click', function(e) {
            // クリックされた場所の座標を取得
            const y = Math.round(e.latlng.lat);
            const x = Math.round(e.latlng.lng);
            
            // 次の階層を計算 (1 -> 2 -> 3 -> 1)
            let nextFloor = currentFloor + 1;
            if (nextFloor > 3) nextFloor = 1;
            
            // 階層を切り替える
            changeFloor(nextFloor);
            
            // 開発用：クリックした位置の座標をアラートで教えてくれる
            alert(`マップクリック：【 ${nextFloor}階 】に切り替えました！\n\n（ちなみに今クリックした場所の座標は [Y: ${y}, X: ${x}] です。ピンの位置調整に使ってね）`);
        });

        // ルートを検索して画像の上に線を引く関数
        function searchRoute() {
            const startKey = document.getElementById('start').value;
            const endKey = document.getElementById('end').value;

            const startPt = spots[startKey];
            const endPt = spots[endKey];

            // すでに古いルート線があれば消す
            if (currentRoute) {
                map.removeLayer(currentRoute);
            }

            // 2つのピンの座標を結ぶ（画像の上に赤い点線を引く）
            const routePoints = [startPt.coords, endPt.coords];
            currentRoute = L.polyline(routePoints, {
                color: '#ff3b30',
                weight: 6,
                opacity: 0.8,
                dashArray: '8, 8'
            }).addTo(map);

            // ルート全体が画面に綺麗に収まるようにズームを自動調整
            map.fitBounds(currentRoute.getBounds(), { padding: [50, 50] });

            // 【天才ポイント】目的地のスポットがある階層に、自動で画面を切り替える
            changeFloor(endPt.floor);
        }

        // ページを開いた瞬間に、まずは1階を表示させる
        changeFloor(1);
    </script>
</body>
</html>

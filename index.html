<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>大商学園 校内マップ</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<h1>大商学園 校内マップ</h1>





<!-- 目的地選択 -->

<div class="destination">


<select id="destination">


<option value="">
目的地を選択
</option>


<option value="Library">
図書室
</option>
  
<option value="Ignitionbase">
Ignition Base
</option>

<option value="Studyroom">
Study Room
</option>
  
<option value="Millenniumhall">
ミレニアムホール
</option>

<option value="Artroom">
美術室
</option>

<option value="Exerciseroom">
演習室
</option>
  
<option value="Scienceroom">
理科実験室
</option>
  
<option value="Kateikaroom">
家庭科室
</option>
   
<option value="Shodouroom">
書道教室
</option>
      
<option value="A">
あ
</option>
   
<option value="entrance">
正門
</option>


<option value="stairs">
中央階段
</option>


</select>



<button onclick="showDestination()">

表示

</button>


</div>









<!-- 建物・階 -->

<div class="floor-select">



<select id="building">


<option value="">
建物を選択
</option>


<option value="S">
新館
</option>


<option value="AB">
AB館
</option>


<option value="G">
グラウンド側
</option>


</select>





<select id="floor">


<option value="">
階を選択
</option>


</select>



</div>









<!-- 地図 -->

<div id="map-container">



<img

id="map"

src="AB1F.png"

alt="校内マップ"


>



<div id="marker"></div>



</div>







<!-- 座標 -->

<p>


クリック座標：

<span id="coordinate">

---

</span>


</p>









<script src="script.js"></script>


</body>


</html>

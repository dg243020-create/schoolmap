<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>大商学園 校内マップ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<h1>大商学園 校内マップ</h1>

<div id="map-container">


<img

id="map"

src="AB1F.png"

alt="校内マップ"

>
  
<div>

<select id="destination">

<option value="">
目的地を選択
</option>

<option value="library">
図書室
</option>

<option value="entrance">
正門
</option>

<option value="stairs">
中央階段
</option>

</select>


<button onclick="showDestination()">
表示
</button>

</div>


<div id="marker"></div>

<div class="controls">







</div>




<!-- 建物・階選択 -->

<div class="floor-select">


<select id="building">

<option value="">
建物を選択
</option>

<option value="S">
新館
</option>

<option value="AB">
AB館
</option>

<option value="G">
グラウンド側
</option>


</select>




<select id="floor">

<option value="">
階を選択
</option>


</select>



</div>





<p>

クリック座標：

<span id="coordinate">
---
</span>


</p>











<script src="script.js"></script>


</body>
</html>

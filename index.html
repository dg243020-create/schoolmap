<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大商学園 オリジナルイラストマップ風ナビ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; }
        
        /* コントロールパネル */
        #panel { width: 300px; background: #ffffff; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding: 20px; z-index: 10; display: flex; flex-direction: column; gap: 15px; }
        h3 { margin-top: 0; color: #005bac; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        select, button { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background: #005bac; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #004080; }
        
        /* マップエリア */
        #map { flex-grow: 1; height: 100%; background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="panel">
        <h3>大商学園 校内マップ</h3>
        
        <div class="input-group">
            <label for="start">現在地</label>
            <select id="start">
                <option value="gate">① 正門</option>
                <option value="honkan">② 本館入り口</option>
                <option value="gym">③ 体育館</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="end">目的地</label>
            <select id="end">
                <option value="gate">① 正門</option>
                <option value="honkan" selected>② 本館入り口</option>
                <option value="gym">③ 体育館</option>
            </select>
        </div>
        
        <button onclick="searchRoute()">ルートを検索</button>
        <p style="font-size: 11px; color: #888;">※マップ上をクリックすると、その場所の画像上の座標（X, Y）がアラートで出ます。ピンの位置調整に使ってください。</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 【重要】あなたが用意した画像のURL（GitHub用）
        const imageUrl = 'https://raw.githubusercontent.com/dg243020-create/schoolmap/main/A1F.png?t=' + Date.now();
        
        // 【重要】画像の実際のサイズ（ピクセル）を入力してください
        const imageWidth = 3816;
        const imageHeight = 2088;

        // Leafletを「画像専用モード（L.CRS.Simple）」で初期化
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1, // 画像全体が見えるようにズームアウトを許可
            maxZoom: 2
        });

        // 画像の範囲を定義 [南西の座標(0,0), 北東の座標(高さ,幅)]
        const bounds = [[0, 0], [imageHeight, imageWidth]];

        // 地図（ベース）として画像を貼り付ける
        L.imageOverlay(imageUrl, bounds).addTo(map);

        // カメラの初期位置を画像全体にフィットさせる
        map.fitBounds(bounds);

        // 画像の上のスポット座標（ [Y座標, X座標] の順番で指定します ）
        // ※左下が [0,0]、右上が [800, 1200] になります。画像の形に合わせて数字を変えてね！
        const spots = {
            gate: { coords: [150, 200], name: "正門" },
            honkan: { coords: [400, 600], name: "本館入り口" },
            gym: { coords: [300, 900], name: "体育館" }
        };

        // 各スポットにピン（マーカー）を立てる
        for (let key in spots) {
            L.marker(spots[key].coords)
             .addTo(map)
             .bindPopup(`<b>${spots[key].name}</b>`);
        }

        let currentRoute = null;

        // ルート検索ボタンが押された時の処理
        function searchRoute() {
            const startKey = document.getElementById('start').value;
            const endKey = document.getElementById('end').value;

            const startPt = spots[startKey];
            const endPt = spots[endKey];

            // すでに古い線があれば消す
            if (currentRoute) { map.removeLayer(currentRoute); }

            // 2つのピンの座標を結ぶ（画像の上に線を引く）
            const routePoints = [startPt.coords, endPt.coords];

            currentRoute = L.polyline(routePoints, {
                color: '#ff3b30',
                weight: 6,
                opacity: 0.8,
                dashArray: '8, 8' // 点線にする
            }).addTo(map);

            // ルート全体が画面に収まるようにズーム
            map.fitBounds(currentRoute.getBounds(), { padding: [50, 50] });
        }

        // 開発サポート機能：画像の上をクリックしたら座標を教える
        map.on('click', function(e) {
            const y = Math.round(e.latlng.lat);
            const x = Math.round(e.latlng.lng);
            alert(`クリックした場所の座標は\n[Y座標: ${y}, X座標: ${x}] です。\nspotsの数値をこれに書き換えてください。`);
        });
    </script>
</body>
</html>
